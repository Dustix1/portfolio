<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <radialGradient id="sunGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#fff" />
      <stop offset="30%" stop-color="#ffcc00" />
      <stop offset="80%" stop-color="#ff6600" />
      <stop offset="100%" stop-color="#ff3300" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Subtle outer atmosphere -->
  <circle cx="16" cy="16" r="14" fill="#ff6600" opacity="0.2" />
  <!-- Main sun body with gradient -->
  <circle cx="16" cy="16" r="10" fill="url(#sunGradient)" filter="url(#glow)" />
</svg>
